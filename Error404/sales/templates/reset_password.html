<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error404 | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      body {
        background: #0f1113;
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        color: #fff;
      }
      .card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 40px;
        border-radius: 24px;
        width: min(420px, 90vw);
        box-shadow: 0 30px 80px rgba(0,0,0,0.35);
      }
      h2 {
        margin: 0 0 24px;
        font-size: 2rem;
        letter-spacing: -0.04em;
      }
      .input-group { margin-bottom: 20px; }
      .input-group label { display: block; margin-bottom: 10px; color: rgba(255,255,255,0.8); font-weight: 700; }
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.06);
        color: #fff;
        outline: none;
      }
      .input-group input:focus { border-color: #f0ad4e; background: rgba(255,255,255,0.09); }
      .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: #f0ad4e; color: #121417; font-weight: 800; cursor: pointer; }
      .btn:hover { background: #ffbd66; }
      .message { margin-bottom: 18px; padding: 14px; border-radius: 14px; font-size: 0.95rem; }
      .message.success { background: rgba(102, 255, 178, 0.15); color: #d7ffd8; border: 1px solid rgba(102, 255, 178, 0.3); }
      .message.error { background: rgba(255, 107, 107, 0.15); color: #ffb8b8; border: 1px solid rgba(255, 107, 107, 0.3); }
      .link { text-align: center; margin-top: 18px; }
      .link a { color: #d3d6df; text-decoration: none; }
      .link a:hover { color: #fff; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Reset Password</h2>
      {% if messages %}
        {% for message in messages %}
          <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="input-group">
          <label>Email address</label>
          <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label>Verification code</label>
          <input type="text" name="code" placeholder="Enter code" required>
        </div>
        <div class="input-group">
          <label>New password</label>
          <input type="password" name="password" placeholder="New password" required>
        </div>
        <div class="input-group">
          <label>Confirm password</label>
          <input type="password" name="confirm_password" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="btn">Reset Password</button>
      </form>
      <div class="link">
        <a href="{% url 'login' %}">Back to sign in</a>
      </div>
    </div>
  </body>
</html>
